<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Task - ToDo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="input-page">
  <div class="container">
    <h1>Tasks</h1>
    <input type="text" id="taskTitle" placeholder="Enter task name" required />
    <textarea id="taskDesc" placeholder="Task description (optional)"></textarea>
    <input type="datetime-local" id="taskTime" required />
    <button onclick="saveTask()">Save Task</button>
    <a href="tasks.html" class="view-tasks">Go to Tasks →</a>
  </div>
  <script src="script.js"></script>
</body>
</html>
